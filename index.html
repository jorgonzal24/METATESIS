<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorador de Paradigmas y Metodologías de Investigación</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f3f5fb;margin:0;padding:40px}
.container{max-width:1100px;margin:auto;background:#fff;padding:35px;border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,0.08)}
h1{margin-top:0}
select{width:100%;padding:12px;margin-top:10px;font-size:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:25px}
.card{background:#eef2ff;padding:20px;border-radius:10px}
.section{margin-bottom:12px}
.label{font-weight:bold}
ul{margin:8px 0 0 18px}
.steps{background:#f8f9ff;border-left:5px solid #6b7cff;padding:15px;border-radius:6px;margin-top:10px}
.example{background:#f5f7ff;padding:10px;border-radius:6px;margin-top:6px}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1>Explorador de Paradigmas y Metodologías para Tesis</h1>
<p>Seleccione el tipo de problema de investigación. La aplicación mostrará el paradigma recomendado, metodologías posibles, autores representativos, ejemplos de proyectos y el proceso general de investigación.</p>

<select id="problemSelector">
<option value="">-- Seleccionar tipo de problema de investigación --</option>
<option value="causal">Explicar relaciones causales</option>
<option value="impacto">Medir impacto de una intervención</option>
<option value="significados">Comprender significados sociales</option>
<option value="experiencia">Analizar experiencias humanas</option>
<option value="teoria">Construir teoría emergente</option>
<option value="poder">Analizar desigualdad o poder</option>
<option value="practica">Transformar una práctica educativa</option>
<option value="solucion">Resolver un problema aplicado</option>
<option value="innovacion">Diseñar innovación educativa o tecnológica</option>
<option value="politica">Evaluar políticas públicas</option>
</select>

<div id="results"></div>
</div>

<script>
const db={
causal:{
paradigma:"Positivista",
metodologia:"Experimentos y modelos estadísticos",
autores:["Karl Popper","Auguste Comte","Paul Lazarsfeld","Donald Campbell"],
ejemplos:[
"Estudio experimental sobre impacto de métodos de enseñanza en resultados académicos",
"Modelo econométrico para analizar determinantes del crecimiento económico",
"Experimento controlado sobre efectos de una política pública"
],
pasos:[
"Definir problema y variables",
"Formular hipótesis causales",
"Diseñar experimento o estudio correlacional",
"Recolectar datos cuantitativos",
"Aplicar análisis estadístico",
"Interpretar resultados",
"Aceptar o rechazar hipótesis"
]
},
impacto:{
paradigma:"Positivista / Pragmático",
metodologia:"Evaluación de impacto",
autores:["Donald Campbell","William Shadish","Peter Rossi"],
ejemplos:[
"Evaluación del impacto de becas educativas en acceso universitario",
"Impacto de programas de transferencias monetarias",
"Evaluación de intervenciones de salud pública"
],
pasos:[
"Definir intervención",
"Establecer indicadores de impacto",
"Diseñar estudio experimental o cuasi experimental",
"Recolectar datos antes y después",
"Comparar grupos de tratamiento y control",
"Interpretar resultados para políticas"
]
},
significados:{
paradigma:"Interpretativo",
metodologia:"Etnografía",
autores:["Clifford Geertz","James Spradley","Howard Becker"],
ejemplos:[
"Estudio etnográfico sobre cultura escolar",
"Investigación sobre dinámicas sociales en comunidades rurales",
"Análisis cultural de organizaciones"
],
pasos:[
"Definir contexto social",
"Realizar trabajo de campo",
"Observación participante",
"Entrevistas abiertas",
"Codificación y análisis temático",
"Interpretación cultural"
]
},
experiencia:{
paradigma:"Interpretativo",
metodologia:"Fenomenología",
autores:["Edmund Husserl","Martin Heidegger","Max van Manen"],
ejemplos:[
"Experiencia de estudiantes durante educación virtual",
"Vivencias de pacientes en sistemas de salud",
"Experiencias de liderazgo educativo"
],
pasos:[
"Definir fenómeno a estudiar",
"Seleccionar participantes",
"Entrevistas profundas",
"Análisis fenomenológico",
"Identificación de estructuras de experiencia",
"Interpretación del significado"
]
},
teoria:{
paradigma:"Interpretativo",
metodologia:"Teoría fundamentada",
autores:["Barney Glaser","Anselm Strauss","Kathy Charmaz"],
ejemplos:[
"Construcción de teoría sobre procesos de innovación educativa",
"Modelo emergente de emprendimiento social",
"Teoría de colaboración científica"
],
pasos:[
"Recolección inicial de datos",
"Codificación abierta",
"Codificación axial",
"Comparación constante",
"Construcción de categorías",
"Desarrollo de teoría emergente"
]
},
poder:{
paradigma:"Crítico",
metodologia:"Análisis crítico del discurso",
autores:["Michel Foucault","Norman Fairclough","Teun van Dijk"],
ejemplos:[
"Análisis del discurso político sobre educación",
"Estudio crítico de medios de comunicación",
"Investigación sobre lenguaje y poder institucional"
],
pasos:[
"Definir problema social",
"Seleccionar corpus de textos o discursos",
"Análisis lingüístico",
"Análisis de estructuras de poder",
"Interpretación crítica",
"Propuesta de transformación"
]
},
practica:{
paradigma:"Investigación-Acción",
metodologia:"Investigación acción educativa",
autores:["Kurt Lewin","Stephen Kemmis","Robin McTaggart"],
ejemplos:[
"Mejora de estrategias de enseñanza en una escuela",
"Transformación de prácticas pedagógicas",
"Innovación curricular participativa"
],
pasos:[
"Diagnóstico del problema",
"Planificación de acción",
"Implementación",
"Observación de resultados",
"Reflexión crítica",
"Nuevo ciclo de mejora"
]
},
solucion:{
paradigma:"Pragmático",
metodologia:"Métodos mixtos",
autores:["John Creswell","Abbas Tashakkori","Charles Teddlie"],
ejemplos:[
"Evaluación de innovación educativa combinando encuestas y entrevistas",
"Investigación aplicada en organizaciones",
"Estudios de políticas públicas"
],
pasos:[
"Definir problema aplicado",
"Diseñar estrategia mixta",
"Recolectar datos cuantitativos",
"Recolectar datos cualitativos",
"Integrar resultados",
"Proponer soluciones"
]
},
innovacion:{
paradigma:"Diseño Basado en Investigación",
metodologia:"Design-Based Research",
autores:["Ann Brown","Allan Collins","Jan van den Akker","Thomas Reeves"],
ejemplos:[
"Diseño de plataformas educativas",
"Innovación pedagógica basada en tecnología",
"Desarrollo de modelos de aprendizaje"
],
pasos:[
"Análisis del problema",
"Diseño de intervención",
"Implementación piloto",
"Evaluación",
"Rediseño iterativo",
"Generación de principios de diseño"
]
},
politica:{
paradigma:"Pragmático",
metodologia:"Evaluación de políticas",
autores:["Carol Weiss","Peter Rossi","Michael Patton"],
ejemplos:[
"Evaluación de programas sociales",
"Análisis de políticas educativas",
"Estudios de impacto institucional"
],
pasos:[
"Definir política o programa",
"Diseñar modelo de evaluación",
"Recolectar datos de implementación",
"Analizar resultados",
"Comparar objetivos vs resultados",
"Recomendaciones de política"
]
}
}

const selector=document.getElementById("problemSelector")
const results=document.getElementById("results")

selector.addEventListener("change",()=>{
const value=selector.value
if(!value){results.innerHTML="";return}

const item=db[value]

results.innerHTML=`
<div class="grid">

<div class="card">
<div class="section"><span class="label">Paradigma recomendado:</span> ${item.paradigma}</div>
<div class="section"><span class="label">Metodología principal:</span> ${item.metodologia}</div>

<div class="section"><span class="label">Autores representativos:</span>
<ul>${item.autores.map(a=>`<li>${a}</li>`).join("")}</ul>
</div>
</div>

<div class="card">
<div class="section"><span class="label">Ejemplos de proyectos:</span>
${item.ejemplos.map(e=>`<div class='example'>${e}</div>`).join("")}
</div>
</div>

</div>

<div class="card" style="margin-top:20px">
<div class="label">Proceso típico de investigación paso a paso</div>
<div class="steps">
<ol>${item.pasos.map(p=>`<li>${p}</li>`).join("")}</ol>
</div>
</div>
`
})
</script>
</body>
</html>
